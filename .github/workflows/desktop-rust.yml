name: Build Desktop (Rust)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: msi,nsis
            artifact_name: desktop-windows
            artifact_paths: |
              palworld-save-pal/rust/target/release/bundle/msi/*.msi
              palworld-save-pal/rust/target/release/bundle/nsis/*.exe
          - os: macos-latest
            bundles: dmg
            artifact_name: desktop-macos
            artifact_paths: |
              palworld-save-pal/rust/target/release/bundle/dmg/*.dmg
          - os: ubuntu-latest
            bundles: deb,rpm
            artifact_name: desktop-linux
            artifact_paths: |
              palworld-save-pal/rust/target/release/bundle/deb/*.deb
              palworld-save-pal/rust/target/release/bundle/rpm/*.rpm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout palworld-save-pal
        uses: actions/checkout@v3
        with:
          path: palworld-save-pal

      # The Rust workspace consumes uesave as a path dependency that resolves
      # to a sibling checkout (../../uesave-rs/uesave relative to rust/).
      # Recreate the local disk layout: both repos side by side.
      - name: Checkout uesave-rs (path dependency)
        uses: actions/checkout@v3
        with:
          repository: oMaN-Rod/uesave-rs
          ref: palworld-v1
          path: uesave-rs
          token: ${{ secrets.UESAVE_RS_TOKEN || github.token }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build desktop UI
        working-directory: palworld-save-pal
        shell: bash
        run: bash scripts/build-ui-desktop.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: palworld-save-pal/rust

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri bundles
        working-directory: palworld-save-pal/rust/psp-desktop
        run: cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
