name: Build Desktop (Rust)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: msi,nsis
            artifact_name: desktop-windows
            artifact_paths: |
              palworld-save-pal/target/release/bundle/msi/*.msi
              palworld-save-pal/target/release/bundle/nsis/*.exe
          - os: macos-latest
            bundles: dmg
            artifact_name: desktop-macos
            artifact_paths: |
              palworld-save-pal/target/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            bundles: deb,rpm,appimage
            artifact_name: desktop-linux
            artifact_paths: |
              palworld-save-pal/target/release/bundle/deb/*.deb
              palworld-save-pal/target/release/bundle/rpm/*.rpm
              palworld-save-pal/target/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout palworld-save-pal
        uses: actions/checkout@v3
        with:
          path: palworld-save-pal

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install UI deps
        working-directory: palworld-save-pal/ui
        shell: bash
        run: bun install
        # The frontend itself is built by Tauri's beforeBuildCommand
        # (bun run build:desktop) during "Build Tauri bundles".

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: palworld-save-pal
          prefix-key: "v0-rust-${{ matrix.os }}"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked --force

      - name: Build Tauri bundles
        working-directory: palworld-save-pal/psp-desktop
        run: cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Strip host-graphics libs from AppImage
        if: matrix.os == 'ubuntu-22.04'
        working-directory: palworld-save-pal
        run: |
          appimage=$(ls target/release/bundle/appimage/*.AppImage | head -n 1)
          bash scripts/appimage-strip-graphics.sh "$appimage"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
